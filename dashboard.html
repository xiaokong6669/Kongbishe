<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 抗癌肽预测平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .dashboard-container {
            max-width: 1000px;
            margin: 50px auto;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .result-card {
            border-left: 4px solid #667eea;
        }
        .history-table {
            max-height: 400px;
            overflow-y: auto;
        }
        .progress {
            height: 20px;
            border-radius: 10px;
        }
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">抗癌肽预测平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard">仪表盘</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/export_history">导出历史</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1 class="text-center mb-5">抗癌肽预测</h1>
        
        <!-- 序列提交卡片 -->
        <div class="card mb-5">
            <div class="card-body">
                <h3 class="card-title">提交序列</h3>
                <form id="prediction-form">
                    <div class="mb-3">
                        <label for="sequence" class="form-label">氨基酸序列</label>
                        <textarea class="form-control" id="sequence" name="sequence" rows="3" placeholder="输入氨基酸序列，例如：ACDEFGHIKLMNPQRSTVWY" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">预测</button>
                </form>
            </div>
        </div>
        
        <!-- 结果展示卡片 -->
        <div class="card mb-5 result-card" id="result-card" style="display: none;">
            <div class="card-body">
                <h3 class="card-title">预测结果</h3>
                <div id="result-content">
                    <!-- 结果将通过JavaScript动态填充 -->
                </div>
            </div>
        </div>
        
        <!-- 历史记录卡片 -->
        <div class="card">
            <div class="card-body">
                <h3 class="card-title">预测历史</h3>
                <div class="history-table">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>序列</th>
                                <th>预测结果</th>
                                <th>时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for prediction in predictions %}
                            <tr>
                                <td>{{ prediction.sequence }}</td>
                                <td>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar" style="width: {{ prediction.result * 100 }}%;" aria-valuenow="{{ prediction.result * 100 }}" aria-valuemin="0" aria-valuemax="100">
                                            {{ "%.4f"|format(prediction.result) }}
                                        </div>
                                    </div>
                                </td>
                                <td>{{ prediction.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="3" class="text-center">暂无预测历史</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 抗癌肽预测平台</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('prediction-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const sequence = document.getElementById('sequence').value;
            
            // 显示加载状态
            const resultCard = document.getElementById('result-card');
            const resultContent = document.getElementById('result-content');
            resultCard.style.display = 'block';
            resultContent.innerHTML = '<div class="text-center">预测中...</div>';
            
            // 发送请求
            fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'sequence=' + encodeURIComponent(sequence)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    resultContent.innerHTML = '<div class="alert alert-danger">' + data.error + '</div>';
                } else {
                    const prediction = data.prediction;
                    const probability = (prediction * 100).toFixed(2);
                    
                    resultContent.innerHTML = `
                        <div class="mb-3">
                            <p><strong>序列：</strong>${data.sequence}</p>
                        </div>
                        <div class="mb-3">
                            <p><strong>集成预测概率：</strong>${probability}%</p>
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" style="width: ${probability}%;" aria-valuenow="${probability}" aria-valuemin="0" aria-valuemax="100">
                                    ${probability}%
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <h5>各模型预测结果：</h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <p>CNN: ${(data.cnn_prediction * 100).toFixed(2)}%</p>
                                    <p>Bi-LSTM: ${(data.bi_lstm_prediction * 100).toFixed(2)}%</p>
                                </div>
                                <div class="col-md-6">
                                    <p>Transformer: ${(data.transformer_prediction * 100).toFixed(2)}%</p>
                                    <p>GRU: ${(data.gru_prediction * 100).toFixed(2)}%</p>
                                </div>
                            </div>
                        </div>
                        <div class="alert alert-info">
                            <strong>结果解释：</strong>
                            ${prediction > 0.5 ? '该序列很可能是抗癌肽' : '该序列不太可能是抗癌肽'}
                        </div>
                    `;
                    
                    // 不自动刷新页面，让用户手动刷新或通过其他方式查看历史记录
                    // 移除自动刷新，让预测结果保持显示
                }
            })
            .catch(error => {
                resultContent.innerHTML = '<div class="alert alert-danger">预测失败，请稍后重试</div>';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
